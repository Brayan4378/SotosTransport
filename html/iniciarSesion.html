<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soto´s transport</title>
    <link rel="icon" type="image/png" href="../imagenes/ian.jpeg">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/IniciarSesion.js"></script>
</head>

<body>

    <div id="bannerSuperior">
        <img src="../imagenes/logo.png" alt="logo" id="logo">

    </div>

    <div class="contenedor">
        <div id="mensaje"></div>
        <img id="imagenBus"
            src="https://daimlerbuses-mbngw.scene7.com/is/image/daimlerbusesmbngw/mb-omniplus-service-keyvisual-EB51092%3A16x9?ts=1768311806114&dpr=off"
            alt="Bus">
        <div class="overlay"></div>


        <div class="iniciarSesion">
            <h1>Inicia Sesión</h1>
            <p>Accede a tu cuenta</p>
        </div>

        <div id="formulario">
            <h2>Inicia Sesión</h2>
            <p class="sub">Accede a tu cuenta</p>

            <form id="FormularioLogin">
                <label for="usuario">Correo Electrónico</label>
                <input type="text" id="usuario" name="usuario" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>

                <button type="submit" id="btnLogin">Iniciar sesión</button>

                <a href="#" id="olvidaste">¿Olvidaste tu contraseña?</a>

                <div class="registro">
                    <span>¿No tienes cuenta?</span>
                    <button type="button" id="btnRegistrar">Regístrate</button>
                </div>
            </form>
        </div>
    </div>




    <div id="piePagina">
        <div id="contactInfo">
            <h3>Contáctanos</h3>
            <p>Tel: +57 321 2125935</p>
            <p>Email: sotostransport@gmail.com</p>
            <p>Dirección: Armenia Quindio, Colombia</p>
        </div>

        <div id="mapa"></div>
    </div>
    

</body>

</html>
