<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sotos´s transport</title>
    <link rel="icon" type="image/png" href="../imagenes/ian.jpeg">
    <link rel="stylesheet" href="../css/style.css">

    <script src="../js/datos.js"></script>

</head>

<body>
    <h1>Sotos´s transport</h1>
    <button id="btnBuscar">Buscar viaje</button>


    <div id="banner">
        <p>Tu destino a un solo click.</p>
    </div>

    <div class="contenedor">
        <img src="https://viajescolombiaviva.com/wp-content/uploads/elementor/thumbs/BUSES-15-rbl5qs05cc0gv1nfq93hi8vppvpde7i1mfyxe6cg7c.jpg"
            alt="Bus">

        <form id="FormularioLogin">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Iniciar sesión</button>
            <button type="button" id="btnRegistrar">Crear una cuenta nueva</button>
        </form>
    </div>

</body>

</html>
