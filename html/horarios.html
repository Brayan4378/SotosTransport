<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soto's Transport - Horarios</title>
    <link rel="icon" type="image/png" href="../imagenes/ian.jpeg">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../dist/auth.js"></script>
</head>

<body>
    <div id="bannerSuperior">
        <img src="../imagenes/logo.png" alt="logo" id="logo">

        <nav id="menu">
            <a href="index.html">Inicio</a>
            <a href="destinos.html">Destinos</a>
            <a href="horarios.html">Horarios</a>
            <a href="reservas.html">Reservar</a>
            <a href="operaciones.html">Operaciones</a>
            <a href="chat.html">Contacto</a>
        </nav>

        <div class="menu-usuario">
            <a id="cuenta">Cuenta Soto's</a>
            <div class="submenu" id="submenu">
                <a href="perfil.html">Mi perfil</a>
                <a href="logout.html">Cerrar sesion</a>
            </div>
        </div>
    </div>

    <div class="contenedor">
        <div class="overlay"></div>

        <div class="horarios">
            <h2>Horarios disponibles</h2>
            <div class="filtro-horarios">
                <label for="fechaHorarios">Fecha de viaje:</label>
                <input type="date" id="fechaHorarios">
            </div>

            <table class="tabla-horarios">
                <thead>
                    <tr>
                        <th>Origen</th>
                        <th>Destino</th>
                        <th>Hora salida</th>
                        <th>Hora llegada</th>
                        <th>Bus</th>
                        <th>Asientos</th>
                    </tr>
                </thead>
                <tbody id="tablaHorariosBody"></tbody>
            </table>
        </div>

        <script src="../dist/viajes.js"></script>
        <script src="../dist/horarios.js"></script>
        <script src="../dist/CerrarSesion.js"></script>
    </div>
</body>

</html>
