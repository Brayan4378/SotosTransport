<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soto´s transport</title>
    <link rel="icon" type="image/png" href="../imagenes/ian.jpeg">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/Registrar.js"></script>
</head>

<body>

    <div id="bannerSuperior">
        <img src="../imagenes/logo.png" alt="logo" id="logo">

        <nav id="menu">
            <a href="index.html">Inicio</a>
            <a href="destinos.html">Destinos</a>
            <a href="reservas.html">Horarios</a>
            <a href="contacto.html">Contacto</a>
        </nav>

        <a id="comprarAhora" href="reservas.html">Comprar ahora</a>
    </div>

    <div class="contenedor">

        <img id="imagenBus"
            src="https://daimlerbuses-mbngw.scene7.com/is/image/daimlerbusesmbngw/mb-omniplus-service-keyvisual-EB51092%3A16x9?ts=1768311806114&dpr=off"
            alt="Bus">
        <div class="overlay"></div>


        <div class="registrarse">
            <h1>Regístrate</h1>
            <p>Crea una nueva cuenta</p>
        </div>

        <div id="formulario">
            <h2>Regístrate</h2>
            <p class="sub">Crea una nueva cuenta</p>

            <form id="FormularioRegistro">
                <label for="usuario">Nombre: </label>
                <input type="text" id="usuario" name="usuario" required>

                <label for="documento">Documento: </label>
                <input type="text" id="documento" name="documento" required>

                <label for="edad">Edad: </label>
                <input type="number" id="edad" name="edad" required>

                <label for="email">Correo Electrónico</label>
                <input type="text" id="email" name="email" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>

                <button type="submit" id="btnLogin">Regístrate</button>


                <div class="registro">
                    <span>¿Ya tienes cuenta?</span>
                    <button type="button" id="btnRegistrar">Inicia Sesión</button>
                </div>
            </form>
        </div>
    </div>


    <div id="piePagina">
        <div id="contactInfo">
            <h3>Contáctanos</h3>
            <p>Tel: +57 321 2125935</p>
            <p>Email: sotostransport@gmail.com</p>
            <p>Dirección: Armenia Quindio, Colombia</p>
        </div>

        <div id="mapa"></div>
    </div>

</body>

</html>
