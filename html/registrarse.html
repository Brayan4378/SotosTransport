<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sotos´s transport</title>
    <link rel="icon" type="image/png" href="../imagenes/ian.jpeg">
    <link rel="stylesheet" href="../css/style.css">
    <script src="storage.js"></script>

</head>

<body>
    <h1>Sotos´s transport</h1>
    <button id="btnBuscar">Buscar viaje</button>


    <div id="banner">
        <p>Tu destino a un solo click.</p>
    </div>
    <div class = "contenedor">
    <img src="https://viajescolombiaviva.com/wp-content/uploads/elementor/thumbs/BUSES-15-rbl5qs05cc0gv1nfq93hi8vppvpde7i1mfyxe6cg7c.jpg"
        alt="URL">
    <form id = "FormularioLogin">
        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario" name="usuario" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        <label for="correoelectronico">E-mail:</label>
        <input type="email" id="correoelectronico" name="correoelectronico" required>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required>
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" required>
        <button type="submit">Registrarme</button>
        <button id = "btnIniciarSesion">Iniciar sesión</button>

    </form>
    </div>

</body>

</html>
