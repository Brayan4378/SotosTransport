<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soto's transport</title>
    <link rel="icon" type="image/png" href="../imagenes/ian.jpeg">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../dist/auth.js"></script>
</head>

<body>
    <div id="bannerSuperior">
        <img src="../imagenes/logo.png" alt="logo" id="logo">
    </div>

    <div class="contenedor">
        <img id="imagenBus"
            src="https://daimlerbuses-mbngw.scene7.com/is/image/daimlerbusesmbngw/mb-omniplus-service-keyvisual-EB51092%3A16x9?ts=1768311806114&dpr=off"
            alt="Bus">
        <div class="overlay"></div>

        <div class="registrarse">
            <h1>Registrate</h1>
            <p>Crea una nueva cuenta</p>
        </div>

        <div id="formulario">
            <h2>Registrate</h2>
            <p class="sub">Crea una nueva cuenta</p>

            <form id="FormularioRegistro">
                <label for="usuario">Nombre</label>
                <input type="text" id="usuario" name="usuario" required minlength="3" maxlength="40"
                    pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{3,40}"
                    title="Ingresa entre 3 y 40 letras. Solo se permiten letras y espacios.">

                <label for="documento">Documento</label>
                <input type="text" id="documento" name="documento" required inputmode="numeric" minlength="6" maxlength="12"
                    pattern="[0-9]{6,12}" title="El documento debe tener entre 6 y 12 digitos numericos.">

                <label for="edad">Edad</label>
                <input type="number" id="edad" name="edad" required min="18" max="100">

                <label for="email">Correo electronico</label>
                <input type="email" id="email" name="email" required maxlength="80"
                    title="Ingresa un correo valido, por ejemplo usuario@correo.com">

                <label for="password">Contrasena</label>
                <input type="password" id="password" name="password" required minlength="8" maxlength="24"
                    title="Minimo 8 caracteres con mayuscula, minuscula, numero y simbolo.">

                <label for="confirmPassword">Confirmar contrasena</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" maxlength="24"
                    title="Debe coincidir exactamente con la contrasena.">

                <button type="submit" id="btnLogin">Registrate</button>

                <div class="registro">
                    <span>Ya tienes cuenta?</span>
                    <button type="button" id="btnRegistrar">Inicia sesion</button>
                </div>
            </form>
        </div>
    </div>

    <div id="piePagina">
        <div id="contactInfo">
            <h3>Contactanos</h3>
            <p>Tel: +57 321 2125935</p>
            <p>Email: sotostransport@gmail.com</p>
            <p>Direccion: Armenia Quindio, Colombia</p>
        </div>

        <div id="mapa"></div>
    </div>

    <script src="../dist/Registrar.js"></script>
</body>

</html>
