<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soto´s Transport - Reservas</title>
    <link rel="icon" type="image/png" href="../imagenes/ian.jpeg">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/reservas.js" defer></script>
</head>

<body>
    <div id="bannerSuperior">
        <img src="../imagenes/logo.png" alt="logo" id="logo">
        <nav id="menu">
            <a href="index.html">Inicio</a> <a href="destinos.html">Destinos</a> <a href="horarios.html">Horarios</a> <a
                href="reservas.html"><strong>Reservas</strong></a> <a href="iniciarSesion.html">Iniciar sesión</a> <a
                href="registrarse.html">Registrarse</a> <a href="contacto.html">Contacto</a>
        </nav>
        <a id="comprarAhora" href="reservas.html">Comprar ahora</a>
    </div>

    <div class="contenedor">
        <div class="reservaViaje">
            <h2>Reserva tu viaje</h2>
            <form id="formReserva">
                <label for="origen">Origen:</label>
                <select name="origen" id="origen" required>
                    <option value="armenia">Armenia</option>
                </select>
                <label for="destino">Destino:</label>
                <select name="destino" id="destino" required>
                    <option value="" disabled selected>Seleccione destino</option>
                    <option value="bogota">Bogotá</option>
                    <option value="medellin">Medellín</option>
                    <option value="cali">Cali</option>
                </select>
                <label for="hora">Horario:</label>
                <select name="hora" id="hora" required>
                    <option value="" disabled selected>Seleccione horario</option>
                    <option value="06:00">06:00 AM</option>
                    <option value="07:30">07:30 AM</option>
                    <option value="08:00">08:00 AM</option>
                    <option value="14:00">02:00 PM</option>
                    <option value="16:00">04:00 PM</option>
                    <option value="17:00">05:00 PM</option>
                </select>
                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha" name="fecha" required>
                <label for="pasajeros">Pasajeros:</label>
                <input type="number" id="pasajeros" name="pasajeros" min="1" max="50" required>
                <button type="submit">Reservar</button>
            </form>
        </div>
    </div>

    <div id="imagenBusContainer">
        <img id="imagenBus"
            src="https://media.istockphoto.com/id/1154164634/es/foto/autob%C3%BAs-blanco-viajando-en-la-carretera-de-asfalto-alrededor-de-la-l%C3%ADnea-de-%C3%A1rboles-en-el.jpg?b=1&s=1024x1024&w=0&k=20&c=-DNj2gk6ZYE8PrGwbV2XfHiOvYf17Elw4iwdI1wycSM="
            alt="Bus">
    </div>
</body>

</html>
