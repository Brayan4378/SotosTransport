<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soto´s transport</title>
    <link rel="icon" type="image/png" href="../imagenes/ian.jpeg">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/storage.js"></script>
</head>

<body>
    <div id="bannerSuperior">
        <img src="../imagenes/logo.png" alt="logo" id="logo">

        <div id="menu">
            <button id="inicio">Inicio</button>
            <button id="destinos">Destinos</button>
            <button id="horarios">Horarios</button>
            <button id="comprar">Comprar boleto</button>
            <button id="contacto">Contacto</button>
        </div>

        <a id="comprarAhora" href="login.html">Iniciar sesión</a>
    </div>

    <div class="contenedor">

        <div class="reservaViaje">
            <form action="selec" method="get">
                <label>
                    <input type="radio" name="tipo_viaje" value="ida_vuelta" checked>
                    Ida y vuelta
                </label>
                <label>
                    <input type="radio" name="tipo_viaje" value="solo_ida">
                    Solo ida
                </label>

                <label for="origen">Origen:</label>
                <select name="origen" id="origen" required>
                    <option value="armenia">Armenia</option>
                </select>

                <label for="destino">Destino:</label>
                <select name="destino" id="destino" required>
                    <option value="" disabled selected>Seleccione destino</option>
                    <option value="bogota">Bogotá</option>
                    <option value="medellin">Medellín</option>
                    <option value="cali">Cali</option>
                </select>

                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha" name="fecha" required>

                <label for="pasajeros">Pasajeros:</label>
                <input type="number" id="pasajeros" name="pasajeros" min="1" max="50" required>

                <button type="submit">Reservar</button>
            </form>
        </div>
    </div>
    
    <img id = "imagenBus" src="https://media.istockphoto.com/id/1154164634/es/foto/autob%C3%BAs-blanco-viajando-en-la-carretera-de-asfalto-alrededor-de-la-l%C3%ADnea-de-%C3%A1rboles-en-el.jpg?b=1&s=1024x1024&w=0&k=20&c=-DNj2gk6ZYE8PrGwbV2XfHiOvYf17Elw4iwdI1wycSM=" alt="Bus">

    <div id="piePagina">
        <div id="contactInfo">
            <h3>Contáctanos</h3>
            <p>Tel: +57 321 2125935</p>
            <p>Email: sotostransport@gmail.com</p>
            <p>Dirección: Armenia Quindio, Colombia</p>
        </div>

        <div id="mapa"></div>
    </div>

</body>


</html>
